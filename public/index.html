<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USB Speed Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>

    <main class="container">
        <header>
            <div class="title-group">
                <h1>USB Speed Monitor</h1>
                <p class="subtitle">Real-time Read & Write Performance</p>
            </div>
            <div class="header-actions">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search by label...">
                </div>
                <button id="refreshBtn" class="refresh-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.67-5.67"/>
                    </svg>
                    Refresh Now
                </button>
            </div>
        </header>

        <div class="speed-reference-strip">
            <span class="ref-label">Speed Reference:</span>
            <span class="ref-badge">Class 4/6: <b>4-6 MB/s</b></span>
            <span class="ref-badge">Class 10/U1: <b>10 MB/s</b></span>
            <span class="ref-badge">U3/V30: <b>30 MB/s</b></span>
            <span class="ref-badge">V60: <b>60 MB/s</b></span>
            <span class="ref-badge">V90: <b>90 MB/s</b></span>
        </div>

        <div id="loading" class="loading-state hidden">
            <div class="spinner"></div>
            <p>Testing drive speed...</p>
            <p id="loading-progress" style="font-weight: 600; margin-top: 8px;"></p>
        </div>

        <div id="usb-container">
            <!-- USB Cards will be injected here -->
        </div>

        <div id="empty-state" class="empty-state">
            <div class="icon">🔌</div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
